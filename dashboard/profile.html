<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール - ryopc</title>

    <link rel="stylesheet" href="/style.css">

    <style>
        body {
            background: var(--bg);
        }

        .profile-wrapper {
            max-width: 900px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .profile-card {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.12);
            border: 1px solid rgba(226,232,240,0.8);
            margin-bottom: 2rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 1rem;
        }

        .profile-sub {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 0.4rem;
            display: block;
        }

        .form-control {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.15);
            background: #ffffff;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,123,255,0.15);
            outline: none;
        }

        .save-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }
        .save-btn:hover {
            background: var(--primary-light);
            transform: translateY(-3px);
        }

        .logout-btn {
            padding: 0.9rem 1.4rem;
            background: #ef4444;
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 2rem;
        }
        .logout-btn:hover {
            background: #dc2626;
            transform: translateY(-3px);
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="nav-logo" onclick="location.href='/'">ryopc</div>
    </div>

    <div class="profile-wrapper">

        <div class="profile-card">
            <div class="profile-title">プロフィール</div>
            <div class="profile-sub">アカウント情報を確認・編集できます。</div>

            <form id="profile-form">

                <div class="form-group">
                    <label>名前</label>
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>

                <button type="submit" class="save-btn">保存する</button>
            </form>

            <button class="logout-btn" onclick="logout()">ログアウト</button>
        </div>

    </div>

<script>
async function loadUser() {
    const res = await fetch("https://auth.ryopc.f5.si/me", {
        credentials: "include"
    });

    const json = await res.json();

    if (!json.success) {
        location.href = "/login/";
        return;
    }

    document.getElementById("name").value = json.name;
    document.getElementById("email").value = json.email;
}

document.getElementById("profile-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    const res = await fetch("https://auth.ryopc.f5.si/update", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email }),
        credentials: "include"
    });

    const json = await res.json();

    if (json.success) {
        alert("保存しました！");
    } else {
        alert(JSON.stringify(json));
    }
});

async function logout() {
    await fetch("https://auth.ryopc.f5.si/logout", {
        method: "POST",
        credentials: "include"
    });

    location.href = "/login/";
}

loadUser();
</script>

</body>
</html>
