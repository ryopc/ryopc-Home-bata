name: AI Code Reviewer Bot

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize]

# 👇 権限を修正：普通のPush時にコミットへ書き込めるよう 'contents: write' に変更
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: コードの変更差分（diff）を抽出
        id: get_diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > code_changes.diff
          else
            git diff HEAD~1 HEAD > code_changes.diff
          fi
          
          # 差分が空っぽなら終了
          if [ ! -s code_changes.diff ]; then
            echo "No changes found."
            exit 0
          fi

      - name: Gemini APIで英語のコードレビューを生成
        id: gemini_api
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 差分ファイルの中身を読み込む
          DIFF_CONTENT=$(cat code_changes.diff)
          
          # AIへの英語のプロンプト（指示書）を作成
          PROMPT="You are a strict and helpful senior software engineer. Please review the following git diff code changes. Check if the code is correct, look for any bugs, and suggest improvements. Please provide all your feedback and replies in English only. Here is the code:\n\n$DIFF_CONTENT"
          
          # JSON形式のデータを作成（改行やクォーテーションを安全に処理）
          jq -n --arg msg "$PROMPT" '{"contents": [{"parts": [{"text": $msg}]}]}' > payload.json
          
          # 👇 修正：{GEMINI_KEY} に $ が抜けていたのを $GEMINI_KEY に修正
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=$GEMINI_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json)
          
          # AIの返答を抽出してファイルに保存
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > review_reply.txt

      - name: レビュー結果を自動で書き込み
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('review_reply.txt')) return;
            const body = fs.readFileSync('review_reply.txt', 'utf8');
            if (!body || body === 'null') return;
            
            if (context.eventName === 'pull_request') {
              // プルリクエストの場合は、PRのコメント欄に書き込む
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              // 普通のコミット（Push）の場合は、コミットのコメント欄に書き込む
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: body
              });
            }
