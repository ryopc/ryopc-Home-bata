<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blog - ryopc Global Digital Support</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0052cc; --primary-light: #0764f1; --dark: #0a192f; --dark-light: #172a45;
            --accent: #00bfff; --bg: #f8fafc; --text: #334155; --text-light: #94a3b8; --white: #ffffff;
            --glass: rgba(13, 29, 52, 0.9); --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --gradient-accent: linear-gradient(135deg, #00bfff, #0052cc);
        }
        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        #scroll-progress { position: fixed; top: 0; left: 0; width: 0%; height: 4px; background: var(--gradient-accent); z-index: 1000001; }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; padding: 1rem 2.5rem; z-index: 100000; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-logo { color: var(--white); font-weight: 800; font-size: 1.2rem; text-decoration: none; }
        header { background: radial-gradient(circle at top right, var(--dark-light), var(--dark)); color: var(--white); padding: 12rem 1.5rem 11rem; text-align: center; }
        header h1 { margin: 0; font-size: clamp(2.8rem, 10vw, 4.5rem); font-weight: 800; background: linear-gradient(135deg, var(--white) 40%, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 900px; margin: -5rem auto 6rem; padding: 0 1.5rem; position: relative; z-index: 10; }
        .blog-list { display: flex; flex-direction: column; gap: 2rem; }
        .card { background: var(--white); padding: 3rem; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); border: 1px solid rgba(226, 232, 240, 0.8); transition: var(--transition); display: flex; flex-direction: column; gap: 1rem; }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); }
        .blog-date { color: var(--text-light); font-size: 0.9rem; font-weight: 600; }
        .blog-title { color: var(--dark); font-size: 1.75rem; margin: 0; font-weight: 800; }
        .blog-body { color: var(--text); font-size: 1.05rem; }
        .blog-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 20px; }
        footer { background-color: var(--dark); color: var(--text-light); padding: 4rem 1.5rem; text-align: center; }
    </style>
</head>
<body>

    <div id="scroll-progress"></div>

    <nav class="navbar">
        <a href="../" class="nav-logo">ryopc</a>
    </nav>

    <header>
        <h1>Blog</h1>
    </header>

    <div class="container">
        <!-- ここに自動で記事が追加されていきます -->
        <div id="blog-container" class="blog-list">
            <div class="card"><p style="text-align:center; color:var(--text-light);">記事を読み込んでいます...</p></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 ryopc Global Digital Support</p>
    </footer>

    <script>
        // スクロールバーの動き
        window.addEventListener('scroll', () => {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById('scroll-progress').style.width = (winScroll / height) * 100 + '%';
        });

        // 【自動化コアシステム】GitHub API経由でblog内のJSONを自動全取得する仕組み
        async function loadBlogs() {
            const container = document.getElementById('blog-container');
            
            // 下記の3つをご自身の環境（GitHub）の情報に書き換えてください
            const OWNER = "あなたのGitHubユーザー名";
            const REPO  = "あなたのリポジトリ名";
            const PATH  = "blog"; // 記事が入っているフォルダ名

            try {
                // GitHubのフォルダ内にあるファイル一覧を自動取得
                const response = await fetch(`https://github.com{OWNER}/${REPO}/contents/${PATH}`);
                if (!response.ok) throw new Error('通信エラー');
                const files = await response.json();

                // JSONファイルだけを抽出（降順ソートで新しい順にする）
                const jsonFiles = files
                    .filter(file => file.name.endsWith('.json'))
                    .sort((a, b) => b.name.localeCompare(a.name));

                if (jsonFiles.length === 0) {
                    container.innerHTML = '<div class="card"><p style="text-align:center; color:var(--text-light);">まだ記事がありません。</p></div>';
                    return;
                }

                container.innerHTML = ''; // ローダー消去

                // 取得したJSONファイルを1つずつ読み込んでHTML化
                for (const file of jsonFiles) {
                    const postRes = await fetch(file.download_url);
                    if (!postRes.ok) continue;
                    const data = await postRes.json();

                    const card = document.createElement('article');
                    card.className = 'card';

                    let imgHtml = data.image ? `<img src="..${data.image}" alt="${data.title}" class="blog-img">` : '';

                    card.innerHTML = `
                        <div class="blog-date">${data.date || ''}</div>
                        <h2 class="blog-title">${data.title}</h2>
                        ${imgHtml}
                        <div class="blog-body">${data.body}</div>
                    `;
                    container.appendChild(card);
                }
            } catch (error) {
                container.innerHTML = '<div class="card"><p style="text-align:center; color:red;">記事の読み込みに失敗しました。GitHubの設定を確認してください。</p></div>';
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadBlogs);
    </script>
</body>
</html>
